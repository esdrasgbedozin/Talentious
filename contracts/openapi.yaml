openapi: 3.0.3
info:
  title: Talentious Backend API
  version: "1.0.0"
  description: |
    API backend V1 de la plateforme Talentious — génération de CV assistée par IA.

    ## Sécurité
    Tous les endpoints nécessitent un JWT Bearer valide (HS256, 30 min), sauf :
    - `POST /auth/register` et `POST /auth/login` : publics (security: [])
    - `POST /billing/webhook` : public mais authentifié par signature HMAC Stripe
      via l'en-tête `Stripe-Signature` — aucun JWT Talentious n'est attendu.

    ## CareerPass
    Les endpoints de génération de CV vérifient l'existence d'un CareerPass actif
    (table `career_passes`, `valid_until > now()`). Un utilisateur avec le rôle `admin`
    bypasse ce contrôle. En l'absence de pass actif, la réponse est `402` au format
    RFC 7807 (`application/problem+json`).

    ## Erreurs
    Toutes les erreurs suivent le standard RFC 7807 (`application/problem+json`).
    Voir le schéma `Problem` dans `components/schemas`.

    ## Génération asynchrone
    La génération de CV est asynchrone. `POST /cv/generate` retourne `202` avec un
    `job_id`. L'état du job est consultable via `GET /cv/jobs/{job_id}`. Une fois le
    job en état `succeeded`, le CV est accessible via `GET /cv/{cv_id}`. Un canal SSE
    optionnel est disponible sur `GET /cv/jobs/{job_id}/events`.

    Transitions d'état d'un job : queued -> running -> succeeded | failed.
  license:
    name: Proprietary
    url: https://talentious.fr/legal/terms

servers:
  - url: https://api.talentious.fr/v1
    description: Production
  - url: https://api-staging.talentious.fr/v1
    description: Staging
  - url: http://localhost:8000/v1
    description: Développement local

security:
  - bearerAuth: []

tags:
  - name: Auth
    description: Inscription, connexion, utilisateur courant
  - name: Profile
    description: Profil maître de l'utilisateur (CRUD)
  - name: CV
    description: Gestion des CV générés
  - name: CV Jobs
    description: Suivi asynchrone de la génération
  - name: Billing
    description: Paiement Stripe et CareerPass
  - name: Account
    description: Gestion du compte utilisateur (RGPD)

# =============================================================================
# PATHS
# =============================================================================
paths:

  # ---------------------------------------------------------------------------
  # Auth
  # ---------------------------------------------------------------------------

  /auth/register:
    post:
      tags: [Auth]
      operationId: registerUser
      summary: Créer un nouveau compte utilisateur
      description: |
        Crée un utilisateur avec le rôle `USER` par défaut et initialise
        un profil vide. Aucun JWT n'est requis.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserCreate'
      responses:
        '201':
          description: Compte créé avec succès
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '400':
          description: Email déjà utilisé
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
              example:
                type: "https://talentious.fr/errors/email-already-registered"
                title: "Email Already Registered"
                status: 400
                detail: "An account with this email address already exists."
                instance: "/v1/auth/register"
        '422':
          $ref: '#/components/responses/ValidationError'

  /auth/login:
    post:
      tags: [Auth]
      operationId: loginUser
      summary: S'authentifier et obtenir un JWT
      description: |
        Authentification par email/mot de passe. Retourne un JWT Bearer valide 30 minutes.
        Le champ `username` du formulaire doit contenir l'adresse email
        (convention OAuth2PasswordRequestForm).
      security: []
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/LoginForm'
      responses:
        '200':
          description: Authentification réussie
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Token'
        '401':
          description: Identifiants invalides
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
              example:
                type: "https://talentious.fr/errors/invalid-credentials"
                title: "Invalid Credentials"
                status: 401
                detail: "Incorrect email or password."
                instance: "/v1/auth/login"
        '422':
          $ref: '#/components/responses/ValidationError'

  /auth/me:
    get:
      tags: [Auth]
      operationId: getCurrentUser
      summary: Obtenir les informations de l'utilisateur courant
      responses:
        '200':
          description: Informations de l'utilisateur
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ---------------------------------------------------------------------------
  # Profile
  # ---------------------------------------------------------------------------

  /profile:
    get:
      tags: [Profile]
      operationId: getProfile
      summary: Lire le profil maître de l'utilisateur courant
      description: |
        Retourne le profil JSONB de l'utilisateur. Si aucun profil n'existe encore,
        un profil vide est créé automatiquement avant d'être retourné.
      responses:
        '200':
          description: Profil de l'utilisateur
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfileResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

    put:
      tags: [Profile]
      operationId: updateProfile
      summary: Mettre à jour le profil maître
      description: |
        Remplace l'intégralité du profil JSONB. Le corps doit contenir le ProfileData
        canonique complet (pas de patch partiel).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProfileUpdate'
      responses:
        '200':
          description: Profil mis à jour
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfileResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'

  # ---------------------------------------------------------------------------
  # CV — Génération asynchrone
  # ---------------------------------------------------------------------------

  /cv/generate:
    post:
      tags: [CV]
      operationId: generateCV
      summary: Lancer la génération asynchrone d'un CV
      description: |
        Soumet une demande de génération de CV et retourne immédiatement un `job_id`.
        La génération réelle (2-5 min) se fait en arrière-plan.

        Prérequis : l'utilisateur doit avoir un CareerPass actif, ou le rôle `admin`.
        L'utilisateur doit avoir un profil avec au moins une expérience renseignée.

        Idempotency : une seule génération active par utilisateur à la fois.
        Si un job est déjà en état `queued` ou `running` pour l'utilisateur courant,
        la réponse est `409`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GenerateCVRequest'
      responses:
        '202':
          description: Job de génération accepté
          headers:
            Location:
              description: URL de suivi du job (`/v1/cv/jobs/{job_id}`)
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenerateCVJobAccepted'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '402':
          description: CareerPass actif requis
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
              example:
                type: "https://talentious.fr/errors/career-pass-required"
                title: "Career Pass Required"
                status: 402
                detail: "An active Career Pass is required to generate CVs. Please purchase a pass."
                instance: "/v1/cv/generate"
        '404':
          description: Profil utilisateur introuvable
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
        '409':
          description: Une génération est déjà en cours
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
              example:
                type: "https://talentious.fr/errors/generation-in-progress"
                title: "Generation Already In Progress"
                status: 409
                detail: "A CV generation job is already running for your account. Please wait for it to complete."
                instance: "/v1/cv/generate"
        '422':
          $ref: '#/components/responses/ValidationError'

  /cv/jobs/{job_id}:
    get:
      tags: [CV Jobs]
      operationId: getCVJobStatus
      summary: Consulter l'état d'un job de génération
      description: |
        Retourne l'état courant du job : `queued`, `running`, `succeeded` ou `failed`.

        - `queued` : en attente d'un worker.
        - `running` : traitement en cours ; le champ `progress_pct` indique l'avancement (0-100).
        - `succeeded` : génération terminée ; `cv_id` est renseigné.
        - `failed` : la génération a échoué ; `error_message` contient un message générique.
      parameters:
        - name: job_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: État du job
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CVJobStatus'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /cv/jobs/{job_id}/events:
    get:
      tags: [CV Jobs]
      operationId: getCVJobEvents
      summary: Flux SSE de progression du job (optionnel)
      description: |
        Canal Server-Sent Events pour suivre en temps réel la progression d'un job
        de génération. Le client reçoit des événements `progress` (avec `progress_pct`)
        et un événement `done` (avec `cv_id` en cas de succès, ou `error` en cas d'échec).

        Ce canal est optionnel : le polling sur `GET /cv/jobs/{job_id}` est
        l'alternative recommandée si SSE n'est pas supporté côté client.

        Formats SSE émis :

        Progression : `event: progress` / `data: {"progress_pct": 45, "step": "analyzing_offer"}`

        Succes : `event: done` / `data: {"status": "succeeded", "cv_id": "<uuid>"}`

        Echec : `event: done` / `data: {"status": "failed", "error": "Generation failed. Please retry."}`
      parameters:
        - name: job_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Flux SSE ouvert
          content:
            text/event-stream:
              schema:
                type: string
                description: Flux d'événements SSE (voir description de l'opération pour les formats)
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  # ---------------------------------------------------------------------------
  # CV — CRUD
  # ---------------------------------------------------------------------------

  /cv:
    get:
      tags: [CV]
      operationId: listCVs
      summary: Lister tous les CV de l'utilisateur courant
      description: Retourne la liste paginée des CV générés, sans le contenu JSON complet.
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - name: offset
          in: query
          schema:
            type: integer
            minimum: 0
            default: 0
      responses:
        '200':
          description: Liste des CV
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CVListItem'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /cv/{cv_id}:
    get:
      tags: [CV]
      operationId: getCV
      summary: Obtenir le détail complet d'un CV
      parameters:
        - $ref: '#/components/parameters/cvIdPath'
      responses:
        '200':
          description: CV complet
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CVDetailResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

    put:
      tags: [CV]
      operationId: updateCV
      summary: Mettre à jour le nom ou les données d'un CV
      description: |
        Met à jour le nom du CV (`cv_name`) et/ou son contenu JSON (`cv_data_json`).
        Utilisé notamment par l'éditeur WYSIWYG pour sauvegarder les modifications manuelles.
      parameters:
        - $ref: '#/components/parameters/cvIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateCVRequest'
      responses:
        '200':
          description: CV mis à jour
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CVDetailResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'

    delete:
      tags: [CV]
      operationId: deleteCV
      summary: Supprimer un CV
      description: |
        Supprime le CV et, si un PDF GCS existe (`gcs_pdf_url`), le fichier associé
        est également supprimé du bucket.
      parameters:
        - $ref: '#/components/parameters/cvIdPath'
      responses:
        '204':
          description: CV supprimé avec succès (aucun corps)
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  # ---------------------------------------------------------------------------
  # Billing
  # ---------------------------------------------------------------------------

  /billing/checkout-session:
    post:
      tags: [Billing]
      operationId: createCheckoutSession
      summary: Créer une session Stripe Checkout
      description: |
        Crée une session Stripe Checkout pour l'achat d'un CareerPass et retourne
        l'URL de redirection vers la page de paiement Stripe.

        Une fois le paiement validé côté Stripe, le webhook `/billing/webhook`
        reçoit l'événement `checkout.session.completed` et crée automatiquement
        un `CareerPass` pour l'utilisateur.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CheckoutSessionRequest'
      responses:
        '200':
          description: Session Stripe créée
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CheckoutSessionResponse'
        '400':
          description: Type de pass invalide
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '502':
          description: Erreur Stripe
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'

  /billing/webhook:
    post:
      tags: [Billing]
      operationId: stripeWebhook
      summary: Webhook Stripe (endpoint public, non protégé par JWT)
      description: |
        Endpoint public non protégé par JWT. La signature Stripe est vérifiée via
        l'en-tête `Stripe-Signature` (secret `STRIPE_WEBHOOK_SECRET`).

        Événements traités :
        - `checkout.session.completed` : crée un `CareerPass` pour l'utilisateur
          identifié par `client_reference_id` (UUID utilisateur). La durée est déduite
          du `price_id` Stripe (`pass_type` = `PASS_30_DAYS` ou `PASS_90_DAYS`).

        Note : `stripe_payment_id` est nullable — les CareerPass créés par un admin
        (via seed/outil d'administration) n'ont pas de `stripe_payment_id`.
      security: []
      parameters:
        - name: Stripe-Signature
          in: header
          required: true
          schema:
            type: string
          description: Signature HMAC calculée par Stripe (vérifiée côté serveur)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: Payload brut de l'événement Stripe (non typé dans ce contrat)
      responses:
        '200':
          description: Webhook traité avec succès
          content:
            application/json:
              schema:
                type: object
                properties:
                  received:
                    type: boolean
                    example: true
        '400':
          description: Signature invalide ou payload malformé
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'

  /billing/catalog:
    get:
      tags: [Billing]
      operationId: getBillingCatalog
      summary: Catalogue des Pass achetables
      description: |
        Liste les Pass proposés à l'achat avec leur prix. Le montant est lu en
        direct depuis Stripe (source unique de vérité) : `amount_cents` et
        `currency` peuvent être `null` si Stripe n'est pas configuré ou si la
        récupération échoue — dans ce cas le prix est confirmé à l'étape Checkout.
      responses:
        '200':
          description: Catalogue des Pass
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BillingCatalogResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /billing/status:
    get:
      tags: [Billing]
      operationId: getBillingStatus
      summary: Statut d'accès (Pass actif ?)
      description: |
        Indique si l'utilisateur détient un CareerPass actuellement valide et,
        le cas échéant, jusqu'à quand.
      responses:
        '200':
          description: Statut d'accès de l'utilisateur
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BillingStatusResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ---------------------------------------------------------------------------
  # Account (RGPD Art. 17)
  # ---------------------------------------------------------------------------

  /users/me:
    delete:
      tags: [Account]
      operationId: deleteAccount
      summary: Supprimer définitivement le compte (RGPD Art. 17)
      description: |
        Purge complète et irréversible de toutes les données personnelles :

        1. Suppression de tous les CV générés (table `generated_cvs`).
        2. Suppression des PDF associés dans le bucket GCS.
        3. Suppression du profil (table `user_profiles`).
        4. Suppression des CareerPasses (table `career_passes`).
        5. Suppression du compte utilisateur (table `users`).

        Cette opération est irréversible. Le JWT de l'utilisateur est invalidé
        immédiatement après. Conforme au droit à l'effacement RGPD Article 17.
      responses:
        '204':
          description: Compte et toutes les données supprimés (aucun corps)
        '401':
          $ref: '#/components/responses/Unauthorized'

# =============================================================================
# COMPONENTS
# =============================================================================
components:

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT HS256, durée de vie 30 minutes. Obtenu via POST /v1/auth/login.

  parameters:
    cvIdPath:
      name: cv_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Identifiant unique du CV

  # ---------------------------------------------------------------------------
  # Réponses réutilisables
  # ---------------------------------------------------------------------------
  responses:
    Unauthorized:
      description: JWT absent ou invalide
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
          example:
            type: "https://talentious.fr/errors/unauthorized"
            title: "Unauthorized"
            status: 401
            detail: "Missing or invalid authentication token."
            instance: "/v1/auth/me"

    Forbidden:
      description: Accès refusé (ressource appartenant à un autre utilisateur)
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
          example:
            type: "https://talentious.fr/errors/forbidden"
            title: "Forbidden"
            status: 403
            detail: "You do not have permission to access this resource."
            instance: "/v1/cv/00000000-0000-0000-0000-000000000000"

    NotFound:
      description: Ressource introuvable
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
          example:
            type: "https://talentious.fr/errors/not-found"
            title: "Not Found"
            status: 404
            detail: "The requested resource was not found."
            instance: "/v1/cv/00000000-0000-0000-0000-000000000000"

    ValidationError:
      description: Erreur de validation du corps de la requête (Pydantic)
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
          example:
            type: "https://talentious.fr/errors/validation-error"
            title: "Validation Error"
            status: 422
            detail: "Request body validation failed."
            instance: "/v1/profile"

  # ---------------------------------------------------------------------------
  # Schémas
  # ---------------------------------------------------------------------------
  schemas:

    # =========================================================================
    # RFC 7807 — Problem Details
    # =========================================================================
    Problem:
      type: object
      description: |
        Erreur au format RFC 7807 (application/problem+json).
        Aucune information interne (stack trace, str(e)) ne doit figurer
        dans `detail` en production.
      required:
        - type
        - title
        - status
      properties:
        type:
          type: string
          description: URI identifiant le type d'erreur
          example: "https://talentious.fr/errors/career-pass-required"
        title:
          type: string
          description: Titre court lisible par un humain
          example: "Career Pass Required"
        status:
          type: integer
          description: Code HTTP
          example: 402
        detail:
          type: string
          description: Explication détaillée, lisible par un humain (sans internals)
          example: "An active Career Pass is required to generate CVs."
        instance:
          type: string
          description: URI de la ressource ayant provoqué l'erreur
          example: "/v1/cv/generate"

    # =========================================================================
    # Auth
    # =========================================================================
    UserCreate:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          maxLength: 255
          example: "alice@example.com"
        password:
          type: string
          minLength: 8
          maxLength: 128
          description: Mot de passe en clair (haché côté serveur avec bcrypt)
          example: "S3cr3t!Pass"

    LoginForm:
      type: object
      required:
        - username
        - password
      properties:
        username:
          type: string
          format: email
          description: Adresse email de l'utilisateur (champ `username` par convention OAuth2)
        password:
          type: string

    Token:
      type: object
      required:
        - access_token
        - token_type
      properties:
        access_token:
          type: string
          description: JWT HS256
        token_type:
          type: string
          enum: [bearer]
          example: "bearer"

    UserResponse:
      type: object
      required:
        - id
        - email
        - role
        - is_active
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        role:
          $ref: '#/components/schemas/UserRole'
        is_active:
          type: boolean
        stripe_customer_id:
          type: string
          nullable: true
          description: Identifiant client Stripe (null si jamais passé en caisse)

    UserRole:
      type: string
      enum: [USER, ADMIN]
      description: |
        - `USER` : rôle par défaut, soumis au contrôle CareerPass.
        - `ADMIN` : bypass du contrôle CareerPass, accès à toutes les ressources.

    # =========================================================================
    # Profile canonique — SOURCE DE VÉRITÉ
    # =========================================================================

    PersonalInfo:
      type: object
      description: |
        Informations personnelles du candidat. `first_name`, `last_name` et `email`
        sont les seuls champs requis. Tous les autres sont optionnels pour ne pas
        bloquer une création de profil partielle.
      required:
        - first_name
        - last_name
        - email
      properties:
        first_name:
          type: string
          maxLength: 100
          example: "Alice"
        last_name:
          type: string
          maxLength: 100
          example: "Dupont"
        email:
          type: string
          format: email
          example: "alice@example.com"
        phone:
          type: string
          nullable: true
          maxLength: 30
          example: "+33 6 12 34 56 78"
        linkedin:
          type: string
          nullable: true
          maxLength: 500
          example: "https://linkedin.com/in/alice-dupont"
        address:
          type: string
          nullable: true
          maxLength: 255
        city:
          type: string
          nullable: true
          maxLength: 100
          example: "Paris"
        postal_code:
          type: string
          nullable: true
          maxLength: 20
          example: "75001"
        country:
          type: string
          nullable: true
          maxLength: 100
          default: "France"
          example: "France"

    Experience:
      type: object
      description: Expérience professionnelle.
      required:
        - id
        - title
        - company
        - start_date
        - description
      properties:
        id:
          type: string
          description: Identifiant unique côté client (UUID v4 recommandé)
          example: "exp-001"
        title:
          type: string
          maxLength: 255
          example: "Ingénieur Logiciel Senior"
        company:
          type: string
          maxLength: 255
          example: "Acme Corp"
        location:
          type: string
          nullable: true
          maxLength: 255
          example: "Paris, France"
        start_date:
          type: string
          pattern: '^\d{4}-\d{2}$'
          description: Date de début au format YYYY-MM
          example: "2021-03"
        end_date:
          type: string
          nullable: true
          pattern: '^\d{4}-\d{2}$'
          description: Date de fin au format YYYY-MM. Null si poste actuel.
          example: "2024-01"
        is_current:
          type: boolean
          default: false
          description: Indique si ce poste est le poste actuel. Si true, `end_date` doit être null.
        description:
          type: string
          maxLength: 5000
          description: Description du poste et des responsabilités
        achievements:
          type: array
          nullable: true
          items:
            type: string
            maxLength: 500
          description: |
            Liste de réalisations concrètes et chiffrées.
            Transmis à l'agent rédacteur pour enrichir le CV généré.
          example: ["Réduit le temps de build CI de 40%", "Migré 3 services vers Kubernetes"]

    Education:
      type: object
      description: |
        Formation académique. Renommage canonique : `field_of_study` (ancienne version
        frontend/backend Pydantic) est remplacé par `field` (nom unifié).
        Voir README.md pour le mapping des renommages.
      required:
        - id
        - degree
        - institution
      properties:
        id:
          type: string
          example: "edu-001"
        degree:
          type: string
          maxLength: 255
          example: "Master en Informatique"
        institution:
          type: string
          maxLength: 255
          example: "Université Paris-Saclay"
        location:
          type: string
          nullable: true
          maxLength: 255
        field:
          type: string
          nullable: true
          maxLength: 255
          description: |
            Domaine d'étude. Remplace `field_of_study` (frontend TS, backend Pydantic).
            Renommage documenté dans README.md.
          example: "Intelligence Artificielle"
        start_date:
          type: string
          nullable: true
          pattern: '^\d{4}-\d{2}$'
          description: Date de début, format YYYY-MM. Optionnelle.
          example: "2019-09"
        end_date:
          type: string
          nullable: true
          pattern: '^\d{4}-\d{2}$'
          description: |
            Date de fin (obtention du diplôme), format YYYY-MM. Optionnelle.
            Remplace `graduation_date` dans la sortie agent (qui était requis, source de 422).
          example: "2021-06"
        description:
          type: string
          nullable: true
          maxLength: 2000
        grade:
          type: string
          nullable: true
          maxLength: 100
          example: "Mention Très Bien"

    Skills:
      type: object
      description: |
        Structure de compétences côté utilisateur (surface UI et backend).

        Décision de contrat : la structure `{hard: string[], soft: string[]}` est
        conservée comme format canonique unique. L'agent rédacteur reçoit cette même
        structure (plus de transformation runtime dans `cv.py`). L'agent n'a pas besoin
        de niveaux de compétence en entrée — il les infère du profil et de l'offre.
        Les niveaux apparaissent uniquement dans la sortie (`HighlightedSkill`).

        Limite : 20 compétences par catégorie (enforced par validation backend).
      required:
        - hard
        - soft
      properties:
        hard:
          type: array
          items:
            type: string
            maxLength: 100
          maxItems: 20
          default: []
          example: ["Python", "FastAPI", "PostgreSQL", "Docker"]
        soft:
          type: array
          items:
            type: string
            maxLength: 100
          maxItems: 20
          default: []
          example: ["Leadership", "Communication", "Résolution de problèmes"]

    Project:
      type: object
      description: Projet personnel ou professionnel.
      required:
        - id
        - name
        - description
      properties:
        id:
          type: string
          example: "proj-001"
        name:
          type: string
          maxLength: 255
          example: "Talentious"
        description:
          type: string
          maxLength: 3000
          example: "Plateforme SaaS de génération de CV assistée par IA"
        role:
          type: string
          nullable: true
          maxLength: 255
          description: |
            Rôle tenu dans le projet. Présent dans le backend et le frontend ;
            était absent dans l'agent rédacteur (champ perdu). Désormais inclus
            dans le contrat canonique et transmis à l'agent.
          example: "Tech Lead & Développeur Principal"
        url:
          type: string
          nullable: true
          maxLength: 500
          example: "https://github.com/acme/talentious"
        start_date:
          type: string
          nullable: true
          pattern: '^\d{4}-\d{2}$'
          example: "2023-01"
        end_date:
          type: string
          nullable: true
          pattern: '^\d{4}-\d{2}$'
          example: "2024-06"
        technologies:
          type: array
          nullable: true
          items:
            type: string
            maxLength: 100
          example: ["FastAPI", "Next.js", "Vertex AI"]

    Certification:
      type: object
      description: |
        Certification professionnelle.

        Renommage canonique : `issuing_organization` (frontend TS, backend Pydantic)
        devient `issuer`. Voir README.md pour le mapping des renommages.

        Tous les champs sauf `id`, `name` et `issuer` sont optionnels pour éviter
        les erreurs 422 sur des profils sans dates ou URLs de certification.
      required:
        - id
        - name
        - issuer
      properties:
        id:
          type: string
          example: "cert-001"
        name:
          type: string
          maxLength: 255
          example: "AWS Certified Solutions Architect"
        issuer:
          type: string
          maxLength: 255
          description: |
            Organisation émettrice. Remplace `issuing_organization` (frontend/backend).
            L'agent rédacteur utilisait déjà `issuer` — c'est ce nom qui est retenu.
          example: "Amazon Web Services"
        issue_date:
          type: string
          nullable: true
          pattern: '^\d{4}-\d{2}$'
          description: Date d'obtention, format YYYY-MM. Optionnelle.
          example: "2023-04"
        expiration_date:
          type: string
          nullable: true
          pattern: '^\d{4}-\d{2}$'
          description: |
            Date d'expiration, format YYYY-MM. Null si pas d'expiration.
            Présent dans frontend/backend ; était absent côté agent (champ perdu).
          example: "2026-04"
        credential_id:
          type: string
          nullable: true
          maxLength: 255
          example: "ABC-123456"
        credential_url:
          type: string
          nullable: true
          maxLength: 500
          description: |
            URL de vérification de la certification.
            Était présent dans frontend/backend, absent côté agent (champ perdu).
          example: "https://www.credly.com/badges/abc-123"

    Language:
      type: object
      description: |
        Maîtrise linguistique. Ce champ était présent dans l'agent rédacteur mais
        jamais transmis depuis le backend (absent du profil backend/frontend).
        Il est désormais inclus dans le ProfileData canonique.
      required:
        - name
        - level
      properties:
        name:
          type: string
          maxLength: 100
          example: "Anglais"
        level:
          type: string
          maxLength: 100
          description: |
            Niveau de maîtrise. Valeurs recommandées (non exhaustives) :
            Natif, Courant, Avancé, Intermédiaire, Débutant.
          example: "Courant"

    ProfileData:
      type: object
      description: |
        Modèle de profil canonique unique — SOURCE DE VÉRITÉ.

        Ce schéma est la référence pour : backend I/O (routes `/profile`), entrée
        de l'agent rédacteur-cv, et extraction partielle par le parser-pdf.
        Les types Pydantic (backend) et TypeScript (frontend) sont GÉNÉRÉS depuis
        ce schéma via openapi-generator. Ne jamais modifier le code sans mettre
        ce contrat à jour d'abord.
      required:
        - personal_info
        - summary
        - skills
      properties:
        personal_info:
          $ref: '#/components/schemas/PersonalInfo'
        summary:
          type: string
          maxLength: 2000
          description: Résumé professionnel libre
          example: "Ingénieure logiciel passionnée par l'IA et les systèmes distribués."
        experiences:
          type: array
          items:
            $ref: '#/components/schemas/Experience'
          default: []
        educations:
          type: array
          items:
            $ref: '#/components/schemas/Education'
          default: []
        skills:
          $ref: '#/components/schemas/Skills'
        languages:
          type: array
          items:
            $ref: '#/components/schemas/Language'
          default: []
          description: |
            Langues parlées. Était présent dans l'agent rédacteur mais jamais
            transmis depuis le backend. Désormais inclus dans le profil canonique.
        projects:
          type: array
          items:
            $ref: '#/components/schemas/Project'
          default: []
        certifications:
          type: array
          items:
            $ref: '#/components/schemas/Certification'
          default: []

    ProfileResponse:
      type: object
      required:
        - user_id
        - profile_data
        - updated_at
      properties:
        user_id:
          type: string
          format: uuid
        profile_data:
          $ref: '#/components/schemas/ProfileData'
        updated_at:
          type: string
          format: date-time
          description: Horodatage UTC de la dernière mise à jour

    ProfileUpdate:
      type: object
      required:
        - profile_data
      properties:
        profile_data:
          $ref: '#/components/schemas/ProfileData'

    # =========================================================================
    # CV — Génération asynchrone (Job)
    # =========================================================================

    GenerateCVRequest:
      type: object
      required:
        - cv_name
        - offer_text
      properties:
        cv_name:
          type: string
          minLength: 1
          maxLength: 255
          description: Nom donné par l'utilisateur à ce CV
          example: "CV - Ingénieur Backend Acme"
        offer_text:
          type: string
          minLength: 50
          maxLength: 200000
          description: |
            Texte brut de l'offre d'emploi. La borne haute (200 000 caractères)
            est alignée sur la limite de l'agent analyseur.
          example: "Nous recherchons un ingénieur backend senior maîtrisant Python et FastAPI..."

    GenerateCVJobAccepted:
      type: object
      required:
        - job_id
        - status
      properties:
        job_id:
          type: string
          format: uuid
          description: Identifiant du job de génération
        status:
          type: string
          enum: [queued]
          example: "queued"
        message:
          type: string
          example: "CV generation job accepted. Poll GET /v1/cv/jobs/{job_id} for status."

    CVJobStatus:
      type: object
      required:
        - job_id
        - status
        - created_at
      description: |
        Etat d'un job de génération de CV. Transitions : queued -> running -> succeeded | failed.
      properties:
        job_id:
          type: string
          format: uuid
        status:
          type: string
          enum: [queued, running, succeeded, failed]
          description: |
            - `queued` : en attente d'un worker.
            - `running` : traitement IA en cours.
            - `succeeded` : CV généré, `cv_id` renseigné.
            - `failed` : génération échouée, relancer via POST /cv/generate.
        progress_pct:
          type: integer
          nullable: true
          minimum: 0
          maximum: 100
          description: Avancement (0-100). Renseigné uniquement pour le statut `running`.
          example: 55
        cv_id:
          type: string
          nullable: true
          format: uuid
          description: Identifiant du CV créé. Renseigné uniquement si statut = `succeeded`.
        error_message:
          type: string
          nullable: true
          description: |
            Message d'erreur générique (sans internals). Renseigné uniquement si statut = `failed`.
          example: "CV generation failed. Please try again."
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          nullable: true
          format: date-time

    # =========================================================================
    # CV — CRUD
    # =========================================================================

    CVListItem:
      type: object
      required:
        - id
        - cv_name
        - template_id
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
        cv_name:
          type: string
        template_id:
          type: string
          example: "modern_v1"
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CVDetailResponse:
      type: object
      required:
        - id
        - cv_name
        - template_id
        - cv_data_json
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
        cv_name:
          type: string
        template_id:
          type: string
          example: "modern_v1"
        job_offer_context:
          type: string
          nullable: true
          description: Texte de l'offre d'emploi utilisée pour la génération
        cv_data_json:
          $ref: '#/components/schemas/GeneratedCVData'
        gcs_pdf_url:
          type: string
          nullable: true
          description: URL GCS du PDF exporté. Null si pas encore généré.
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    UpdateCVRequest:
      type: object
      description: Tous les champs sont optionnels ; au moins un doit être fourni.
      properties:
        cv_name:
          type: string
          nullable: true
          minLength: 1
          maxLength: 255
        cv_data_json:
          $ref: '#/components/schemas/GeneratedCVData'

    # =========================================================================
    # Sortie agent rédacteur — GeneratedCVData
    # =========================================================================

    GeneratedCVData:
      type: object
      description: |
        CV optimisé produit par l'agent rédacteur-cv. Stocké en JSONB dans
        `generated_cvs.cv_data_json`.

        Contrainte : aucun champ date n'est requis dans les sous-schémas de sortie
        (`SelectedEducation`, `SelectedCertification`) pour éviter les 422 aléatoires
        lorsque l'IA ne génère pas ces dates.
      required:
        - personal_info
        - summary
        - selected_experiences
        - highlighted_skills
        - selected_educations
      properties:
        personal_info:
          $ref: '#/components/schemas/PersonalInfo'
        summary:
          type: string
          description: Résumé professionnel réécrit et optimisé pour l'offre (50-120 mots)
        selected_experiences:
          type: array
          items:
            $ref: '#/components/schemas/SelectedExperience'
          description: Expériences sélectionnées et réécrites (3-5 les plus pertinentes)
        highlighted_skills:
          type: array
          items:
            $ref: '#/components/schemas/HighlightedSkill'
          description: Compétences priorisées pour l'offre (8-15)
        selected_educations:
          type: array
          items:
            $ref: '#/components/schemas/SelectedEducation'
        selected_projects:
          type: array
          items:
            $ref: '#/components/schemas/SelectedProject'
          default: []
        selected_certifications:
          type: array
          items:
            $ref: '#/components/schemas/SelectedCertification'
          default: []
        optimization_notes:
          type: string
          nullable: true
          description: |
            Notes internes de l'agent sur sa stratégie d'optimisation.
            NE DOIT PAS être affiché à l'utilisateur final ni loggé en production
            (risque BLK-5 : exfiltration de données via prompt injection).

    SelectedExperience:
      type: object
      required:
        - id
        - title
        - company
        - start_date
        - description
        - highlighted_skills
      properties:
        id:
          type: string
        title:
          type: string
        company:
          type: string
        start_date:
          type: string
          pattern: '^\d{4}-\d{2}$'
        end_date:
          type: string
          nullable: true
          pattern: '^\d{4}-\d{2}$'
        location:
          type: string
          nullable: true
        description:
          type: string
          description: Description réécrite avec verbes d'action et mots-clés de l'offre
        highlighted_skills:
          type: array
          items:
            type: string
          description: Compétences démontrées dans cette expérience, pertinentes pour l'offre

    HighlightedSkill:
      type: object
      required:
        - name
        - category
        - importance
      properties:
        name:
          type: string
        level:
          type: string
          nullable: true
          description: Niveau de maîtrise inféré par l'agent (ex. Expert, Intermédiaire)
        category:
          type: string
          enum: [hard_skill, soft_skill]
        importance:
          type: string
          enum: [Critical, Important, "Nice to have"]
          description: Importance de la compétence pour l'offre ciblée

    SelectedEducation:
      type: object
      required:
        - id
        - degree
        - institution
      description: |
        Formation sélectionnée par l'agent. `end_date` est optionnel
        (était requis dans l'ancienne version — source de 422 aléatoires).
      properties:
        id:
          type: string
        degree:
          type: string
        institution:
          type: string
        end_date:
          type: string
          nullable: true
          pattern: '^\d{4}-\d{2}$'
          description: |
            Date d'obtention du diplôme, format YYYY-MM. Optionnelle.
            Remplace `graduation_date: str` (requis dans l'ancienne version agent).
        description:
          type: string
          nullable: true

    SelectedProject:
      type: object
      required:
        - id
        - name
        - description
        - relevant_skills
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        url:
          type: string
          nullable: true
        completion_date:
          type: string
          nullable: true
          pattern: '^\d{4}-\d{2}$'
        relevant_skills:
          type: array
          items:
            type: string

    SelectedCertification:
      type: object
      required:
        - id
        - name
        - issuer
      description: |
        Certification sélectionnée par l'agent. `issue_date` est optionnel
        (était requis dans l'ancienne version — source de 422 aléatoires).
      properties:
        id:
          type: string
        name:
          type: string
        issuer:
          type: string
        issue_date:
          type: string
          nullable: true
          pattern: '^\d{4}-\d{2}$'
          description: |
            Date d'obtention. Optionnelle.
            Remplace `issue_date: str` (requis dans l'ancienne version agent).
        url:
          type: string
          nullable: true

    # =========================================================================
    # Billing
    # =========================================================================

    PassType:
      type: string
      enum: [PASS_30_DAYS, PASS_90_DAYS]
      description: |
        Type de CareerPass acheté.
        - `PASS_30_DAYS` : acces illimité pendant 30 jours.
        - `PASS_90_DAYS` : acces illimité pendant 90 jours.

    CheckoutSessionRequest:
      type: object
      required:
        - pass_type
      properties:
        pass_type:
          $ref: '#/components/schemas/PassType'
        success_url:
          type: string
          description: URL de redirection après paiement réussi (override de la valeur par défaut)
          example: "https://app.talentious.fr/dashboard?payment=success"
        cancel_url:
          type: string
          description: URL de redirection après annulation du paiement
          example: "https://app.talentious.fr/billing?payment=cancelled"

    CheckoutSessionResponse:
      type: object
      required:
        - checkout_url
        - session_id
      properties:
        checkout_url:
          type: string
          description: URL Stripe Checkout vers laquelle rediriger l'utilisateur
          example: "https://checkout.stripe.com/pay/cs_test_..."
        session_id:
          type: string
          description: Identifiant de la session Stripe Checkout
          example: "cs_test_a1b2c3d4e5f6..."

    CatalogEntry:
      type: object
      required:
        - pass_type
        - duration_days
      properties:
        pass_type:
          $ref: '#/components/schemas/PassType'
        duration_days:
          type: integer
          description: Durée de validité du Pass en jours
          example: 30
        amount_cents:
          type: integer
          nullable: true
          description: |
            Prix en plus petite unité monétaire (centimes), lu depuis Stripe.
            `null` si Stripe n'est pas configuré ou si la récupération a échoué.
          example: 1900
        currency:
          type: string
          nullable: true
          description: Code ISO 4217 en minuscules (ex. `eur`). `null` si inconnu.
          example: "eur"

    BillingCatalogResponse:
      type: object
      required:
        - passes
      properties:
        passes:
          type: array
          items:
            $ref: '#/components/schemas/CatalogEntry'

    BillingStatusResponse:
      type: object
      required:
        - has_active_pass
      properties:
        has_active_pass:
          type: boolean
          description: Vrai si l'utilisateur détient un CareerPass valide
          example: true
        valid_until:
          type: string
          format: date-time
          nullable: true
          description: Date d'expiration du Pass actif, ou `null` si aucun
