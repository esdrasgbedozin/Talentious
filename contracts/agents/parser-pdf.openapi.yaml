openapi: 3.0.3
info:
  title: Agent Parser-PDF
  version: "1.0.0"
  description: |
    Microservice d'import de PDF (CV ou profil LinkedIn exporté), basé sur
    PyMuPDF (fitz) pour l'extraction de texte et Vertex AI (Gemini) pour la
    structuration en ProfileData.

    ## Décision architecturale (M8-T01, 2026-07-21)
    Ce service EST l'agent d'import : il possède la chaîne complète
    PDF → texte → ProfileData structuré (endpoint /extract-profile). L'ancienne
    recommandation « rebrancher comme fonction backend » est remplacée : l'IA
    vit dans les agents (cohérence avec analyseur-offre et redacteur-cv).

    ## Accès
    Ce service est privé (Cloud Run --no-allow-unauthenticated). Seul le compte
    de service du backend est autorisé (rôle IAM roles/run.invoker).

    ## Sécurité de l'extraction (entrée non fiable)
    Le contenu d'un PDF est une entrée NON FIABLE (injection de prompt
    possible). Garde-fous imposés par ce contrat : texte cloisonné dans des
    délimiteurs, sortie contrainte par response_schema (JSON structuré Gemini),
    validation stricte contre le ProfileData canonique, texte tronqué à
    30 000 caractères avant l'appel IA. Le résultat est un BROUILLON : le
    backend/le client ne doivent JAMAIS le persister sans relecture humaine.

    ## Erreurs
    Toutes les erreurs suivent le standard RFC 7807 (application/problem+json).
  license:
    name: Proprietary
    url: https://talentious.fr/legal/terms

servers:
  - url: http://localhost:8001
    description: Développement local
  - url: https://parser-pdf-placeholder-ew.a.run.app
    description: Cloud Run (URL interne au réseau privé GCP — remplacer par l'URL réelle)

security:
  - iamAuth: []

tags:
  - name: Parsing
    description: Extraction de texte depuis un PDF
  - name: Health
    description: Vérification de santé du service

paths:

  /parse:
    post:
      tags: [Parsing]
      operationId: parsePDF
      summary: Extraire le texte d'un fichier PDF
      description: |
        Reçoit un fichier PDF (CV ou export LinkedIn) en multipart/form-data et
        retourne le texte extrait page par page, sans structuration sémantique.

        Limites :
        - Taille maximale : 10 Mo
        - Format attendu : application/pdf
        - PDFs scannés (images uniquement) : non supportés (retourne 422)

        Cet endpoint retourne du texte BRUT, sans structuration sémantique.
        Pour un ProfileData structuré, utiliser POST /extract-profile.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
                  description: Fichier PDF à analyser (max 10 Mo, Content-Type application/pdf)
      responses:
        '200':
          description: Texte extrait avec succès
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ParseResult'
        '400':
          description: Fichier absent, type invalide, fichier vide ou trop volumineux
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
              example:
                type: "https://talentious.fr/errors/no-file-provided"
                title: "No File Provided"
                status: 400
                detail: "No file was provided in the request."
                instance: "/parse"
        '401':
          description: Token IAM absent ou invalide
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
        '422':
          description: PDF valide mais ne contient que des images (OCR non supporté)
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
              example:
                type: "https://talentious.fr/errors/no-text-in-pdf"
                title: "No Extractable Text"
                status: 422
                detail: "The PDF appears to contain only scanned images. Text extraction is not supported for scanned documents."
                instance: "/parse"
        '500':
          description: Erreur interne d'extraction
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'

  /extract-profile:
    post:
      tags: [Parsing]
      operationId: extractProfile
      summary: Extraire un ProfileData structuré depuis un PDF (CV ou export LinkedIn)
      description: |
        Chaîne complète d'import : extraction du texte (PyMuPDF) puis
        structuration par Gemini en ProfileData canonique
        (contracts/openapi.yaml#/components/schemas/ProfileData).

        Gère les CV classiques ET les exports PDF de profils LinkedIn
        (libellés fr/en). Les champs introuvables sont laissés vides ('' / []) —
        jamais inventés. Le résultat est un BROUILLON destiné à la relecture
        humaine ; il ne doit jamais être persisté tel quel.

        Limites : 10 Mo, 20 pages, texte tronqué à 30 000 caractères avant
        l'appel IA (signalé dans warnings).
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
                  description: Fichier PDF (max 10 Mo, application/pdf)
      responses:
        '200':
          description: ProfileData extrait (brouillon à relire)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExtractResult'
        '400':
          description: Fichier absent, type invalide, vide, trop volumineux ou trop de pages
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
        '401':
          description: Token IAM absent ou invalide
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
        '422':
          description: PDF sans texte extractible (scan) ou structuration impossible
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
        '502':
          description: Vertex AI indisponible ou réponse invalide après retries
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
        '500':
          description: Erreur interne
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'

  /health:
    get:
      tags: [Health]
      operationId: healthCheck
      summary: Vérification de santé du service
      security: []
      responses:
        '200':
          description: Service opérationnel
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
        '503':
          description: Service dégradé ou indisponible
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

components:

  securitySchemes:
    iamAuth:
      type: http
      scheme: bearer
      description: Token IAM Google. Seul le compte de service backend est autorisé (roles/run.invoker).

  schemas:

    Problem:
      type: object
      required:
        - type
        - title
        - status
      properties:
        type:
          type: string
          description: URI identifiant le type d'erreur
          example: "https://talentious.fr/errors/no-file-provided"
        title:
          type: string
          description: Titre court lisible par un humain
          example: "No File Provided"
        status:
          type: integer
          description: Code HTTP
          example: 400
        detail:
          type: string
          description: Explication détaillée sans internals
          example: "No file was provided in the request."
        instance:
          type: string
          description: URI de la ressource concernée
          example: "/parse"

    ExtractResult:
      type: object
      description: |
        Brouillon de profil structuré extrait d'un PDF. Le champ profile_data
        suit le schéma canonique ProfileData
        (contracts/openapi.yaml#/components/schemas/ProfileData) — non dupliqué
        ici (source de vérité unique). Les champs introuvables sont vides,
        jamais inventés. À faire relire par l'utilisateur avant toute
        persistance.
      required:
        - profile_data
        - warnings
      properties:
        profile_data:
          type: object
          description: ProfileData canonique (voir contracts/openapi.yaml)
        warnings:
          type: array
          items:
            type: string
          description: |
            Avertissements non bloquants (ex. « texte tronqué à 30000
            caractères », « aucune expérience détectée »).
          example: ["Texte tronqué à 30000 caractères (PDF de 26 pages)"]

    ParseResult:
      type: object
      description: |
        Résultat de l'extraction PDF. Contient uniquement le texte brut
        (pour un ProfileData structuré, voir /extract-profile et ExtractResult).
      required:
        - text
        - page_count
        - character_count
      properties:
        text:
          type: string
          description: Texte brut extrait de toutes les pages du PDF
          example: "Alice Dupont\nIngénieure Logiciel\nalice@example.com\n..."
        page_count:
          type: integer
          minimum: 1
          description: Nombre de pages du PDF
          example: 2
        character_count:
          type: integer
          minimum: 1
          description: Nombre de caractères extraits
          example: 3450
        filename:
          type: string
          nullable: true
          description: Nom du fichier uploadé (tel que fourni par le client)
          example: "cv_alice_dupont.pdf"

    HealthResponse:
      type: object
      required:
        - status
        - service
      properties:
        status:
          type: string
          enum: [healthy, degraded, unhealthy]
          example: "healthy"
        service:
          type: string
          example: "parser-pdf"
        version:
          type: string
          nullable: true
          example: "1.0.0"
