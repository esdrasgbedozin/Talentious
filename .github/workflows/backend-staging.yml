name: Backend Staging - CI/CD

on:
  push:
    branches:
      - develop
    paths:
      - 'backend/**'
      - '.github/workflows/backend-staging.yml'

env:
  PROJECT_ID: talentious-project
  REGION: europe-west9
  SERVICE_NAME: backend-staging
  REGISTRY: europe-west9-docker.pkg.dev
  REPOSITORY: talentious-images

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: talentious
          POSTGRES_PASSWORD: talentious
          POSTGRES_DB: talentious_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt
      
      - name: Run tests with pytest
        run: |
          cd backend
          pytest tests/ -v
        env:
          DATABASE_URL: postgresql+asyncpg://talentious:talentious@localhost:5432/talentious_test
          SECRET_KEY: test-secret-key-for-ci
          ENVIRONMENT: testing

  build-and-deploy:
    name: Build and Deploy to Cloud Run
    needs: test
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}
      
      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker ${{ env.REGISTRY }} --quiet
      
      - name: Build Docker image
        run: |
          docker build \
            -t ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/backend:${{ github.sha }} \
            -t ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/backend:latest \
            ./backend
      
      - name: Push Docker image to Artifact Registry
        run: |
          docker push ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/backend:${{ github.sha }}
          docker push ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/backend:latest
      
      - name: Install Cloud SQL Proxy
        run: |
          wget https://dl.google.com/cloudsql/cloud_sql_proxy.linux.amd64 -O cloud_sql_proxy
          chmod +x cloud_sql_proxy
      
      - name: Run Database Migrations
        run: |
          # Start Cloud SQL Proxy in background on non-standard port 6543
          ./cloud_sql_proxy -instances=${{ secrets.CLOUD_SQL_CONNECTION_NAME }}=tcp:6543 &
          PROXY_PID=$!
          trap 'kill $PROXY_PID' EXIT
          
          # Wait for proxy to be ready (poll for TCP connection)
          for i in {1..30}; do
            if nc -z localhost 6543 2>/dev/null; then
              echo "Cloud SQL Proxy is ready."
              break
            fi
            echo "Waiting for Cloud SQL Proxy... (attempt $i)"
            sleep 1
          done
          
          # Run Alembic migrations
          cd backend
          pip install -r requirements.txt
          alembic upgrade head
        env:
          DATABASE_URL: postgresql+asyncpg://talentious:talentious@localhost:6543/talentious
      
      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image=${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/backend:${{ github.sha }} \
            --platform=managed \
            --region=${{ env.REGION }} \
            --allow-unauthenticated \
            --port=8000 \
            --set-env-vars="ENVIRONMENT=staging" \
            --set-secrets="SECRET_KEY=JWT_SECRET_KEY:latest,DATABASE_URL=DATABASE_URL:latest" \
            --add-cloudsql-instances=${{ secrets.CLOUD_SQL_CONNECTION_NAME }} \
            --memory=512Mi \
            --cpu=1 \
            --min-instances=0 \
            --max-instances=10
      
      - name: Show service URL
        run: |
          echo "Service deployed at:"
          gcloud run services describe ${{ env.SERVICE_NAME }} \
            --region=${{ env.REGION }} \
            --format='value(status.url)'
